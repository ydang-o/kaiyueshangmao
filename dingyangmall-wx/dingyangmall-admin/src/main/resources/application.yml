# 项目相关配置
dingyangmall:
  # 名称
  name: RuoYi
  # 版本
  version: 3.8.8
  # 版权年份
  copyrightYear: 2024
  # 文件路径 示例（ Windows配置D:/ruoyi/uploadPath，Linux配置 /home/ruoyi/uploadPath）
  profile: D:/ruoyi/uploadPath
  # 获取ip地址开关
  addressEnabled: false
  # 验证码类型 math 数字计算 char 字符验证
  captchaType: math

# 开发环境配置
server:
  # 服务器的HTTP端口，默认为7500
  port: 7500
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100

# 日志配置
logging:
  level:
    com.dingyangmall: debug
    org.springframework: warn

# 用户配置
user:
  password:
    # 密码最大错误次数
    maxRetryCount: 5
    # 密码锁定时间（默认10分钟）
    lockTime: 10

# Spring配置
spring:
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: druid
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 10MB
      # 设置总上传的文件大小
      max-request-size: 20MB
  # 服务模块
  devtools:
    restart:
      # 热部署开关
      enabled: true
  data:
    # redis 配置（系统配置缓存等依赖 Redis，未启动时应用无法启动；wx.ma.session-use-redis 仅控制小程序会话是否用 Redis）
    redis:
      # 地址
      host: ${REDIS_HOST:localhost}
      # 端口，默认为6379
      port: ${REDIS_PORT:6379}
      # 数据库索引
      database: 0
      # 密码
      password: ${REDIS_PASSWORD:}
      # 连接超时时间
      timeout: 10s
      lettuce:
        pool:
          # 连接池中的最小空闲连接
          min-idle: 0
          # 连接池中的最大空闲连接
          max-idle: 8
          # 连接池的最大数据库连接数
          max-active: 8
          # #连接池最大阻塞等待时间（使用负值表示没有限制）
          max-wait: -1ms

# token配置（生产环境请通过环境变量 JWT_SECRET 注入至少32位随机密钥）
token:
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥，生产务必使用环境变量：JWT_SECRET
  secret: ${JWT_SECRET:abcdefghijklmnopqrstuvwxyz}
  # 令牌有效期（默认30分钟）
  expireTime: 30

# MyBatisPlus配置
mybatis-plus:
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 自定义TypeHandler
  type-handlers-package: com.dingyangmall.framework.config.typehandler
  #实体扫描，多个package用逗号或者分号分隔
  typeAliasesPackage: com.dingyangmall.**.domain,com.dingyangmall.**.entity
  global-config:
    #是否控制台
    banner: false
    db-config:
      #主键类型
      id-type: auto

# PageHelper分页插件
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# Springdoc + Knife4j 接口文档（访问 http://localhost:7500/doc.html 查看）
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  tags-sorter: alpha
  # 必须为每个分组指定 packages-to-scan，否则分组下不会出现任何接口
  packages-to-scan: com.dingyangmall
  group-configs:
    - group: 'default'
      display-name: '全部接口'
      packages-to-scan: com.dingyangmall
      paths-to-match: '/**'
    - group: 'weixin'
      display-name: '移动端-小程序'
      packages-to-scan: com.dingyangmall
      paths-to-match: '/weixin/**'
    - group: 'app'
      display-name: '移动端-App'
      packages-to-scan: com.dingyangmall
      paths-to-match: '/app/**'
    - group: 'merchant'
      display-name: '商家端'
      packages-to-scan: com.dingyangmall
      paths-to-match: '/api/mall/merchant/**'
    - group: 'admin'
      display-name: '管理端'
      packages-to-scan: com.dingyangmall
      paths-to-match:
        - '/login'
        - '/getInfo'
        - '/getRouters'
        - '/register'
        - '/registerDistributor'
        - '/captchaImage'
        - '/system/**'
        - '/monitor/**'
        - '/common/**'
        - '/profile/**'
        - '/orderinfo/**'
        - '/orderlogistics/**'
        - '/goodsspu/**'
        - '/goodscategory/**'
        - '/shoppingcart/**'
        - '/useraddress/**'
        - '/mall/**'
        - '/integralrule/**'
        - '/ums/**'
        - '/coupon/**'
        - '/lottery/**'
        - '/sms/**'
        - '/server/**'

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice/*
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*

wx:
  # 公众号配置
  mp:
    configs:
      - appId: xxxxxxxx
        secret: xxxxxxxxxxxxxxxxxxxxxxxxxx
        token: xxxxxxxxxx
        aesKey: xxxxxxxxxxxxxxxxxxxx
  # 小程序配置（与 docker/jar/application.yml 保持一致；IDE/mvn 运行用本文件，Docker 用 docker/jar 下）
  ma:
    # 会话存储：true=登录后写入 Redis，后续请求从 Redis 校验；false=仅用 openid 注入（需前端带 third-session）
    session-use-redis: true
    configs:
      - appId: wx43adcb652c1b2b19
        secret: 1025760f7aea70f78b1496f123d090cf
        # 微信支付商户号，请去微信支付平台申请
        mchId: 1588227511
        # 微信支付商户APIv2密钥，请去微信支付平台申请
        mchKey: xxxxxxxxxxxxxxxxxxxxx
        # p12证书的位置，绝对路径
        keyPath: /mnt/install/dingyangmall-wx/apiclient_cert.p12

mall:
  # 支付、物流回调地址，即后台服务7500端口的外网访问域名，要保证外网能访问，如：https://后台地址/prod-api
  notify-host: http://xx.xxxx.com
  # 快递100（Api100）实时查询：https://api.kuaidi100.com 注册后获取
  kuaidi100-key: ${KUAIDI100_KEY:}
  kuaidi100-customer: ${KUAIDI100_CUSTOMER:}

# 腾讯云短信（未配置或 enabled=false 时仅模拟发送，验证码只写 Redis）
tencent:
  sms:
    enabled: ${TENCENT_SMS_ENABLED:false}
    secret-id: ${TENCENT_SMS_SECRET_ID:}
    secret-key: ${TENCENT_SMS_SECRET_KEY:}
    sms-sdk-app-id: ${TENCENT_SMS_SDK_APP_ID:}
    sign-name: ${TENCENT_SMS_SIGN_NAME:}
    template-id: ${TENCENT_SMS_TEMPLATE_ID:}
    region: ap-guangzhou
